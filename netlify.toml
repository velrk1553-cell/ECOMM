[build]
  base    = "frontend/amercereactjs"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── API proxy — avoids CORS entirely ─────────────────────────
# Browser calls /api/* → Netlify forwards to live PHP backend
[[redirects]]
  from   = "/api/*"
  to     = "https://superfinelabels.in/ecomm/shopkart-api/:splat"
  status = 200
  force  = true

# ── SPA fallback — all other routes → index.html ─────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
